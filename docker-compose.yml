services:
  alphamind:
    build: .
    env_file:
      - .env
    volumes:
      - alphamind_data:/home/appuser/.alphamind
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  alphamind-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - alphamind_data:/home/appuser/.alphamind
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  alphamind_data:
  ollama_data:
